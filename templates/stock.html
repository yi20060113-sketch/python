<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>查詢股價</title>

<style>
body {
    font-family: Arial;
    background-color: #f5f5f5;
}

.header {
    background: #4CAF50;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
}

.box {
    background: white;
    width: 400px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

input, button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
}

.result {
    margin-top: 20px;
    padding: 10px;
    background: #eee;
    border-radius: 8px;
}
</style>

</head>
<body>

<div class="header">查詢股價</div>

<div class="box">
    <form method="POST">
        <input type="text" name="question" placeholder="輸入股票代號" value="{{ question }}">
        <button type="submit">查詢</button>
    </form>

    {% if result %}
    <div class="result">
        {% if result is string %}
            {{ result }}
        {% else %}
            <b>{{ result.name }}</b><br>
            最新成交價：{{ result.price }}<br>
            開盤：{{ result.open }}<br>
            最高：{{ result.high }}<br>
            最低：{{ result.low }}<br>
            成交量：{{ result.volume }}
        {% endif %}
    </div>
    {% endif %}

    <button onclick="location.href='/'">回首頁</button>
</div>

</body>
</html>
