<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>查詢股價</title>
</head>

<body>

<h2>查詢股價</h2>

<form method="POST">
    <input type="text" name="question" placeholder="輸入股票代號" value="{{ question }}">
    <button type="submit">查詢</button>
</form>

{% if result %}
    {% if result is string %}
        <p>{{ result }}</p>
    {% else %}
        <p>公司：{{ result.name }}</p>
        <p>最新成交價：{{ result.price }}</p>
        <p>開盤：{{ result.open }}</p>
        <p>最高：{{ result.high }}</p>
        <p>最低：{{ result.low }}</p>
        <p>成交量：{{ result.volume }}</p>
    {% endif %}
{% endif %}

<button onclick="location.href='/'">回首頁</button>

</body>
</html>
